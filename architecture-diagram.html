<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Architecture Diagram | Simple People Holdings LLC-S</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    font-weight: 300;

    display: flex;

    align-items: center;
    padding: 40px 20px 60px;
  }
  h1 {
    font-family: Georgia, serif;
    font-size: 28px;

    color: #E9C46A;

  }
  .subtitle {
    font-size: 13px;
    color: #7A6A40;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 50px;
  }
  svg {
    max-width: 100%;
    height: auto;
  }
  .legend {
    margin-top: 40px;
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #7A6A40;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<h1>Simple People Holdings LLC-S</h1>
<p class="subtitle">Website Architecture</p>

<svg width="880" height="620" viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg">
  <defs>

  <!-- ==================== -->

  <line x1="440" y1="100" x2="440" y2="168" stroke="#E9C46A" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="455" y="140" fill="#7A6A40" font-family="Helvetica, sans-serif" font-size="10">HTTPS</text>

  <text x="440" y="542" text-anchor="middle" fill="#7A6A40" font-family="Helvetica, sans-serif" font-size="11">aws s3 sync + CloudFront</text>

  <text x="140" y="208" text-anchor="middle" fill="#6B5A2E" font-family="Georgia, serif" font-size="13" font-weight="700">Custom Domain</text>
  <text x="140" y="232" text-anchor="middle" fill="#7A6A40" font-family="Helvetica, sans-serif" font-size="12">simplepeopleholdings.com</text>

  <text x="270" y="207" fill="#6B5A2E" font-family="Helvetica, sans-serif" font-size="9">DNS</text>

</svg>
